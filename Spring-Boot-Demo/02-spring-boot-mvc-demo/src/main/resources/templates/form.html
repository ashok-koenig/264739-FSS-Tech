<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Form</title>
</head>
<body>
    <h1>Employee Form</h1>
    <form method="post" th:action="@{/save}" th:object="${employee}">
        Name: <input type="text" id="name" th:field="*{name}" />
        <span style="color: red;" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        Email: <input type="email" id="email" th:field="*{email}" />
        <span style="color: red;" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        Salary: <input type="number" id="salary" th:field="*{salary}" />
        <span style="color: red;" th:if="${#fields.hasErrors('salary')}" th:errors="*{salary}"></span>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
