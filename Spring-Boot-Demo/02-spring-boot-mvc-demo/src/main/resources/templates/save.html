<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Saved Employee Details</title>
</head>
<body>
    <h1>Saved Employee Details</h1>
    <h3>Name: <span th:text="${employee.name}"></span></h3>
    <h3>Email: <span th:text="${employee.email}"></span></h3>
    <h3>Salary: <span th:text="${employee.salary}"></span></h3>
</body>
</html>
