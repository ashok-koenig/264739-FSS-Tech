spring.application.name=demo

server.port=8082

# ---- SECURITY: talk to the SASL_SSL listener from performance-security-demo/docker-compose.yml instead of plaintext 9092 ----
spring.kafka.bootstrap-servers=localhost:9094
# encrypt the connection (broker cert trusted via the truststore below)
spring.kafka.security.protocol=SASL_SSL
# authenticate as this consumer's own principal - must match a user_notification_service= entry in the broker's JAAS config
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="notification_service" password="notification-service-secret";
# trust the broker's self-signed demo cert (generated by certs/generate-certs.sh)
spring.kafka.ssl.trust-store-location=file:../certs/kafka.client.truststore.jks
spring.kafka.ssl.trust-store-password=changeit

spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.demo.model.Order

# ---- PERFORMANCE: fewer, fuller fetch requests instead of a network round trip per record ----
# don't return from a fetch until at least 1KB is available...
spring.kafka.consumer.properties.fetch.min.bytes=1024
# ...but never wait more than 500ms even if that 1KB never arrives (keeps latency bounded)
spring.kafka.consumer.properties.fetch.max.wait.ms=500
# cap how many records one poll() returns, bounding how long a single processing loop takes
spring.kafka.consumer.max-poll-records=500
