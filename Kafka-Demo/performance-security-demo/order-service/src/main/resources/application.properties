spring.application.name=demo

server.port=8081

# ---- SECURITY: talk to the SASL_SSL listener from performance-security-demo/docker-compose.yml instead of plaintext 9092 ----
spring.kafka.bootstrap-servers=localhost:9094
# encrypt the connection (broker cert trusted via the truststore below)
spring.kafka.security.protocol=SASL_SSL
# authenticate as this producer's own principal - must match a user_order_service= entry in the broker's JAAS config
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="order_service" password="order-service-secret";
# trust the broker's self-signed demo cert (generated by certs/generate-certs.sh)
spring.kafka.ssl.trust-store-location=file:../certs/kafka.client.truststore.jks
spring.kafka.ssl.trust-store-password=changeit

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ---- PERFORMANCE: batch more, wait a little longer, compress with lz4 - trades a few ms of latency for much higher throughput ----
# wait up to 20ms for more records to accumulate before sending a batch, instead of sending almost immediately
spring.kafka.producer.properties.linger.ms=20
# allow bigger batches per partition (bytes) so per-request overhead is amortized across more records
spring.kafka.producer.properties.batch.size=32768
# wait for the leader AND all in-sync replicas to ack - safest durability setting, pairs with the throughput gains above
spring.kafka.producer.acks=all
# compress each batch client-side before sending - less network bandwidth and broker disk, low CPU cost
spring.kafka.producer.properties.compression.type=lz4
