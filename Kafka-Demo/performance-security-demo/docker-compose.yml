services:
  broker:
    image: apache/kafka:latest
    container_name: perf-sec-broker
    ports:
      - "9092:9092"   # PLAINTEXT - unauthenticated/unencrypted, kept around so you can compare against the secured listeners
      - "9093:9093"   # SSL - encrypted, still unauthenticated
      - "9094:9094"   # CLIENT (SASL_SSL protocol) - encrypted AND authenticated - what order-service/notification-service/streams-service actually use
    volumes:
      # keystore/creds/JAAS-conf generated by certs/generate-certs.sh, mounted where the apache/kafka
      # image's own /etc/kafka/docker/configure script expects to find them
      - ./certs:/etc/kafka/secrets
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # the 4th listener is named CLIENT rather than SASL_SSL: env-var-to-property conversion turns
      # every underscore into a dot, so a listener literally named SASL_SSL makes
      # KAFKA_LISTENER_NAME_SASL_SSL_PLAIN_SASL_JAAS_CONFIG collapse to the wrong property
      # (listener.name.sasl.ssl.plain...instead of listener.name.sasl_ssl.plain...). Naming the
      # listener CLIENT and mapping it to the SASL_SSL protocol below avoids the collision -
      # clients still connect with security.protocol=SASL_SSL, the listener's own name is invisible to them.
      # CONTROLLER moves to 9095 (unpublished, KRaft-internal only) to free up 9093 for the SSL listener
      KAFKA_LISTENERS: PLAINTEXT://:9092,SSL://:9093,CLIENT://:9094,CONTROLLER://:9095
      # single host-based cluster - every client here runs on the host (mvnw), so all listeners advertise localhost
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,SSL://localhost:9093,CLIENT://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,SSL:SSL,CLIENT:SASL_SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@perf-sec-broker:9095
      # single-broker cluster - defaults of 3 make __consumer_offsets (and other auto-created internal topics)
      # impossible to create, which silently breaks every consumer group - same gotcha as ksqldb-demo/docker-compose.yml
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # ---- SSL: broker's own identity for the SSL and CLIENT/SASL_SSL listeners (self-signed, demo-only - see certs/generate-certs.sh) ----
      # apache/kafka's configure script wants the keystore as a *file* under /etc/kafka/secrets,
      # named via *_FILENAME, with the password read from a *_CREDENTIALS file - not a literal
      # KAFKA_SSL_KEYSTORE_LOCATION/PASSWORD env var (that convention is Confluent-image-only).
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.server.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka_ssl_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: kafka_ssl_key_creds
      # KAFKA_SSL_CLIENT_AUTH is intentionally left unset: one-way TLS only (broker proves its
      # identity to clients; client identity is handled by SASL, not mutual TLS), so no broker-side
      # truststore is needed here.

      # ---- SASL: PLAIN mechanism - one static username/password per demo principal (learning-only, never do this in production) ----
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      # maps to the CLIENT listener's PLAIN JAAS config; each user_<name>="<password>" entry is exactly
      # the principal the ACLs below (acls/apply-acls.sh) grant permissions to
      KAFKA_LISTENER_NAME_CLIENT_PLAIN_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="admin" password="admin-secret"
        user_admin="admin-secret"
        user_order_service="order-service-secret"
        user_notification_service="notification-service-secret"
        user_streams_service="streams-service-secret";
      # the configure script hard-requires KAFKA_OPTS whenever a SASL_* protocol is present; the
      # per-listener JAAS property above is what's actually used, this file just needs to exist
      # (see certs/generate-certs.sh) to satisfy that check
      KAFKA_OPTS: -Djava.security.auth.login.config=/etc/kafka/secrets/broker_jaas.conf

      # ---- ACLs: authorization on - admin plus every other principal needs an explicit grant ----
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      # ANONYMOUS must stay a super user in this single-node demo: KRaft's controller-registration
      # traffic runs over the (unauthenticated, PLAINTEXT) CONTROLLER listener as User:ANONYMOUS,
      # and StandardAuthorizer applies to that internal channel too - without this the broker can't
      # even register itself with its own controller. In production the controller listener runs on
      # a private/trusted network instead of granting ANONYMOUS broad access.
      KAFKA_SUPER_USERS: User:ANONYMOUS;User:admin
