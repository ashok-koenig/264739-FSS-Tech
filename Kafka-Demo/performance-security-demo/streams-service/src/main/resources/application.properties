spring.application.name=streams-service

server.port=8083

# ---- SECURITY: talk to the SASL_SSL listener from performance-security-demo/docker-compose.yml instead of plaintext 9092 ----
# Shared by both the Kafka Streams runtime AND the plain KafkaAdmin bean (KafkaTopicConfig's
# order-confirmations auto-creation uses a regular AdminClient, not the Streams runtime)
spring.kafka.bootstrap-servers=localhost:9094
# security config for the plain AdminClient (KafkaTopicConfig) - encrypt + authenticate as streams_service
spring.kafka.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="streams_service" password="streams-service-secret";
spring.kafka.ssl.trust-store-location=file:../certs/kafka.client.truststore.jks
spring.kafka.ssl.trust-store-password=changeit

# Streams client configs are separate, unprefixed StreamsConfig keys under spring.kafka.streams.properties.*
# (not inherited from the spring.kafka.* keys above) - the actual topology's producer/consumer/admin
# clients need the same security settings repeated here
spring.kafka.streams.properties.security.protocol=SASL_SSL
spring.kafka.streams.properties.sasl.mechanism=PLAIN
spring.kafka.streams.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="streams_service" password="streams-service-secret";
spring.kafka.streams.properties.ssl.truststore.location=../certs/kafka.client.truststore.jks
spring.kafka.streams.properties.ssl.truststore.password=changeit

spring.kafka.streams.application-id=streams-service-app
spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.springframework.kafka.support.serializer.JsonSerde
spring.kafka.streams.properties.spring.json.use.type.headers=false
spring.kafka.streams.properties.commit.interval.ms=1000
# separate state dir from the original streams-service module - avoids RocksDB state-store collisions if both run on this machine
spring.kafka.streams.state.dir=/tmp/kafka-streams/performance-security-demo/streams-service

# ---- PERFORMANCE: more parallelism, bigger record cache, compressed output on the topology's own producer ----
# run 2 stream threads instead of the default 1, so partitions get processed in parallel on multi-core machines
spring.kafka.streams.properties.num.stream.threads=2
# buffer up to 10MB of KTable updates in memory before forwarding/writing to the state store's changelog - fewer, larger writes
spring.kafka.streams.properties.cache.max.bytes.buffering=10485760
# compress records the topology itself produces (e.g. to order-confirmations) - same tradeoff as order-service's producer
spring.kafka.streams.properties.producer.compression.type=lz4
